<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1E2D2F" />
<title>lessico</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#1E2D2F;--bg2:#223335;--paper:#F6F1E6;--edge:#EBE3D2;--ink:#2A2823;--line:rgba(246,241,230,.10);--green:#7A9A57;--ochre:#CB9235}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(120% 120% at 50% 0%,var(--bg2) 0%,var(--bg) 60%) fixed;color:var(--paper);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:620px;margin:0 auto;padding:max(24px,env(safe-area-inset-top)) 20px calc(84px + env(safe-area-inset-bottom))}
.head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:18px}
.logo{font-family:'Fraunces',serif;font-weight:600;font-size:28px;letter-spacing:-.02em}
.logo i{color:var(--green);font-style:normal}
.counts{text-align:right;font-size:12px;color:rgba(246,241,230,.55);line-height:1.5}
.counts b{color:var(--paper)}
.scene{perspective:1600px;margin-bottom:18px}
.card{position:relative;width:100%;min-height:clamp(280px,44vw,350px);transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.85,.25,1);cursor:pointer}
.card.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--paper);color:var(--ink);border-radius:18px;padding:22px 26px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 22px 44px -20px rgba(0,0,0,.55),0 2px 0 var(--edge);overflow:hidden}
.face.back{transform:rotateY(180deg)}
.spine{position:absolute;left:0;top:0;bottom:0;width:7px}
.word{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(30px,8vw,44px);line-height:1.05;letter-spacing:-.02em;margin:0}
.sentence{font-family:'Fraunces',serif;font-style:italic;font-size:clamp(16px,4.4vw,19px);line-height:1.5;color:#4A463C;margin-top:14px;max-width:42ch}
.foot{display:flex;align-items:center;justify-content:space-between;padding-top:18px}
.dots{display:inline-flex;gap:5px;flex-wrap:wrap}
.dots span{width:7px;height:7px;border-radius:999px;background:rgba(42,40,35,.16)}
.dots span.f{background:var(--ink)}
.rtag{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ochre)}
.progress{height:5px;border-radius:999px;background:rgba(246,241,230,.08);overflow:hidden;margin:2px 0 16px}
.progress i{display:block;height:100%;background:var(--green);transition:width .3s}
.meta{display:flex;justify-content:space-between;font-size:12px;color:rgba(246,241,230,.55);margin-bottom:6px}
.assess{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border-radius:13px;padding:15px 16px;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;gap:8px;color:var(--paper);background:rgba(246,241,230,.06)}
.btn:active{transform:translateY(1px)}
.btn.miss{background:rgba(203,146,53,.14);border-color:rgba(203,146,53,.4);color:#EAC98A}
.btn.know{background:rgba(122,154,87,.16);border-color:rgba(122,154,87,.45);color:#BBD69A}
.btn.wide{grid-column:1/-1;background:var(--paper);color:var(--ink);border-color:transparent}
.state{text-align:center;padding:34px 18px}
.state .big{font-family:'Fraunces',serif;font-size:24px;margin:0 0 8px}
.state p{color:rgba(246,241,230,.6);font-size:14.5px;line-height:1.55;margin:0 auto 18px;max-width:34ch}
.sec{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:rgba(246,241,230,.42);margin:22px 0 10px;padding-top:16px;border-top:1px solid var(--line)}
.sec.first{border-top:0;padding-top:0;margin-top:6px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;color:rgba(246,241,230,.72)}
.field .sub{font-size:11.5px;color:rgba(246,241,230,.42);line-height:1.4}
.inp{font-family:inherit;font-size:15px;color:var(--paper);background:rgba(246,241,230,.05);border:1px solid var(--line);border-radius:11px;padding:11px 13px;outline:none;width:100%}
.inp:focus{border-color:rgba(246,241,230,.34)}
select.inp{appearance:none}
.numrow .inp{width:100px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:inline-flex;background:rgba(246,241,230,.06);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px;flex-wrap:wrap}
.seg button{font-family:inherit;font-size:12.5px;font-weight:500;color:rgba(246,241,230,.6);background:transparent;border:0;cursor:pointer;padding:6px 13px;border-radius:999px}
.seg button.on{background:var(--paper);color:var(--ink)}
.solid{font-family:inherit;font-weight:600;font-size:14px;color:var(--ink);background:var(--paper);border:0;border-radius:11px;padding:11px 16px;cursor:pointer}
.ghost{font-family:inherit;font-weight:500;font-size:13px;color:rgba(246,241,230,.78);background:rgba(246,241,230,.05);border:1px solid var(--line);border-radius:11px;padding:10px 14px;cursor:pointer}
.ghost:disabled{opacity:.45}
.dngr{color:#E7B77B;border-color:rgba(231,183,123,.3)}
.btnwrap{display:flex;gap:8px;flex-wrap:wrap}
.err{color:#E7B77B;font-size:13px;margin-top:8px}
.hint{font-size:12px;color:rgba(246,241,230,.5);line-height:1.5;margin:0 0 14px}
.search{width:100%;margin-bottom:12px}
.row{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line)}
.row .pair{flex:1;min-width:0}
.row .a{font-family:'Fraunces',serif;font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .b{font-size:13px;color:rgba(246,241,230,.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .st{font-size:10px;font-weight:600;border-radius:5px;padding:3px 6px;white-space:nowrap}
.st.learning{color:#CDE0B4;border:1px solid rgba(122,154,87,.4)}
.st.learned{color:#EAC98A;border:1px solid rgba(203,146,53,.4)}
.st.mastered{color:var(--paper);border:1px solid var(--line);background:rgba(246,241,230,.08)}
.row .del{background:none;border:0;color:rgba(246,241,230,.35);cursor:pointer;padding:4px;font-size:15px;line-height:1}
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:13px;color:rgba(246,241,230,.6)}
.tabs{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(30,45,47,.94);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.tabs button{flex:1;background:none;border:0;color:rgba(246,241,230,.5);font-family:inherit;font-size:12px;font-weight:500;padding:14px 4px;cursor:pointer}
.tabs button.on{color:var(--paper)}
.atools{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.atools .ghost{padding:8px 12px}
.atools .seg{margin-left:auto}
.atools .seg button{padding:6px 11px;font-size:12px}
.astat{text-align:center;font-size:15px;color:rgba(246,241,230,.82);padding:16px 10px;min-height:26px;line-height:1.4}
@media(prefers-reduced-motion:reduce){.card{transition:none}}
</style>
</head>

<script>
"use strict";

/* ============ seed: only used once, to fill an empty library ============ */
const SEED = [
{it:"le faccende domestiche",de:"die Hausarbeit",its:"Ci dividiamo le faccende domestiche in modo che nessuno si senta sovraccarico.",des:"Wir teilen uns die Hausarbeit so auf, dass sich niemand überlastet fühlt.",level:"B2",topic:"Household"},
{it:"passare l'aspirapolvere",de:"staubsaugen",its:"Prima che arrivino gli ospiti, passo velocemente l'aspirapolvere in salotto.",des:"Bevor die Gäste kommen, sauge ich schnell im Wohnzimmer Staub.",level:"B2",topic:"Household"},
{it:"stendere il bucato",de:"die Wäsche aufhängen",its:"Se non stendo il bucato subito, i vestiti prendono un cattivo odore.",des:"Wenn ich die Wäsche nicht sofort aufhänge, riechen die Kleider unangenehm.",level:"B2",topic:"Household"},
{it:"stirare",de:"bügeln",its:"Odio stirare le camicie, perciò cerco di comprarne di stropicciabili.",des:"Ich hasse es, Hemden zu bügeln, deshalb kaufe ich möglichst knitterfreie.",level:"B2",topic:"Household"},
{it:"sparecchiare",de:"abräumen",its:"Dopo cena tocca ai bambini sparecchiare la tavola.",des:"Nach dem Essen sind die Kinder dran, den Tisch abzuräumen.",level:"B2",topic:"Household"},
{it:"spolverare",de:"Staub wischen",its:"Ogni sabato spolvero i mobili e i ripiani della libreria.",des:"Jeden Samstag wische ich Staub von den Möbeln und den Regalen.",level:"B2",topic:"Household"},
{it:"il detersivo",de:"das Waschmittel",its:"Preferisco un detersivo ecologico che non irriti la pelle dei bambini.",des:"Ich bevorzuge ein umweltfreundliches Waschmittel, das die Kinderhaut nicht reizt.",level:"B2",topic:"Household"},
{it:"la lavastoviglie",de:"die Spülmaschine",its:"Conviene accendere la lavastoviglie soltanto quando è piena.",des:"Es lohnt sich, die Spülmaschine erst dann anzustellen, wenn sie voll ist.",level:"B2",topic:"Household"},
{it:"buttare la spazzatura",de:"den Müll rausbringen",its:"Ti ricordi di buttare la spazzatura prima di andare a letto?",des:"Denkst du daran, den Müll rauszubringen, bevor du ins Bett gehst?",level:"B2",topic:"Household"},
{it:"riordinare",de:"aufräumen",its:"I bambini devono imparare a riordinare la propria stanza da soli.",des:"Die Kinder müssen lernen, ihr Zimmer selbst aufzuräumen.",level:"B2",topic:"Household"},
{it:"il disordine",de:"die Unordnung",its:"Con un neonato in casa, un po' di disordine è inevitabile.",des:"Mit einem Säugling im Haus ist ein bisschen Unordnung unvermeidlich.",level:"B2",topic:"Household"},
{it:"innaffiare le piante",de:"die Pflanzen gießen",its:"Mentre siamo in vacanza, il vicino innaffia le nostre piante.",des:"Während wir im Urlaub sind, gießt der Nachbar unsere Pflanzen.",level:"B2",topic:"Household"},
{it:"l'elettrodomestico",de:"das Haushaltsgerät",its:"Questo elettrodomestico consuma meno energia del vecchio modello.",des:"Dieses Haushaltsgerät verbraucht weniger Strom als das alte Modell.",level:"B2",topic:"Household"},
{it:"la bolletta",de:"die Rechnung",its:"In inverno le bollette del riscaldamento aumentano parecchio.",des:"Im Winter steigen die Rechnungen für die Heizung deutlich.",level:"B2",topic:"Household"},
{it:"fare la spesa",de:"einkaufen",its:"Faccio la spesa una volta a settimana per risparmiare tempo.",des:"Ich kaufe einmal pro Woche ein, um Zeit zu sparen.",level:"B2",topic:"Household"},
{it:"la ripartizione dei compiti",de:"die Aufgabenverteilung",its:"Una ripartizione equa dei compiti evita molte discussioni in famiglia.",des:"Eine faire Aufgabenverteilung erspart der Familie viele Diskussionen.",level:"B2",topic:"Household"},
{it:"la routine quotidiana",de:"der Alltag",its:"Con due figli piccoli, la routine quotidiana richiede molta organizzazione.",des:"Mit zwei kleinen Kindern erfordert der Alltag viel Organisation.",level:"B2",topic:"Household"},
{it:"il carico mentale",de:"die mentale Belastung",its:"Spesso il carico mentale della gestione familiare ricade su un solo genitore.",des:"Oft lastet die mentale Belastung der Familienorganisation auf nur einem Elternteil.",level:"B2",topic:"Household"},
{it:"impegnativo",de:"anstrengend",its:"Occuparsi contemporaneamente della casa e dei bambini è davvero impegnativo.",des:"Sich gleichzeitig um Haushalt und Kinder zu kümmern, ist wirklich anstrengend.",level:"B2",topic:"Household"},
{it:"conciliare famiglia e lavoro",de:"Familie und Beruf vereinbaren",its:"Non è sempre facile conciliare famiglia e lavoro.",des:"Es ist nicht immer leicht, Familie und Beruf zu vereinbaren.",level:"B2",topic:"Children"},
{it:"l'educazione",de:"die Erziehung",its:"Sull'educazione dei figli i due genitori dovrebbero essere d'accordo.",des:"Bei der Erziehung der Kinder sollten sich beide Eltern einig sein.",level:"B2",topic:"Children"},
{it:"crescere",de:"großziehen",its:"Crescere un figlio da soli richiede molta forza.",des:"Ein Kind allein großzuziehen erfordert viel Kraft.",level:"B2",topic:"Children"},
{it:"il congedo parentale",de:"die Elternzeit",its:"Dopo la nascita, ha preso sei mesi di congedo parentale.",des:"Nach der Geburt hat er sechs Monate Elternzeit genommen.",level:"B2",topic:"Children"},
{it:"il pannolino",de:"die Windel",its:"Bisogna cambiare il pannolino non appena il bambino è bagnato.",des:"Man muss die Windel wechseln, sobald das Baby nass ist.",level:"B2",topic:"Children"},
{it:"il passeggino",de:"der Kinderwagen",its:"Il passeggino nuovo entra a malapena nell'ascensore.",des:"Der neue Kinderwagen passt kaum in den Aufzug.",level:"B2",topic:"Children"},
{it:"il ciuccio",de:"der Schnuller",its:"A due anni sarebbe ora di togliergli il ciuccio.",des:"Mit zwei Jahren wäre es Zeit, ihm den Schnuller abzugewöhnen.",level:"B2",topic:"Children"},
{it:"l'asilo nido",de:"die Kita",its:"Nostro figlio frequenta l'asilo nido tre giorni a settimana.",des:"Unser Sohn geht drei Tage pro Woche in die Kita.",level:"B2",topic:"Children"},
{it:"il capriccio",de:"der Wutanfall",its:"Al supermercato ha fatto un capriccio perché voleva le caramelle.",des:"Im Supermarkt bekam er einen Wutanfall, weil er Süßigkeiten wollte.",level:"B2",topic:"Children"},
{it:"viziare",de:"verwöhnen",its:"I nonni tendono a viziare i nipoti con troppi regali.",des:"Die Großeltern neigen dazu, die Enkel mit zu vielen Geschenken zu verwöhnen.",level:"B2",topic:"Children"},
{it:"il pisolino",de:"der Mittagsschlaf",its:"Dopo il pisolino pomeridiano il bambino è molto più tranquillo.",des:"Nach dem Mittagsschlaf ist das Kind viel ausgeglichener.",level:"B2",topic:"Children"},
{it:"addormentarsi",de:"einschlafen",its:"Il piccolo fatica ad addormentarsi senza la sua coperta.",des:"Der Kleine kann ohne seine Decke nur schwer einschlafen.",level:"B2",topic:"Children"},
{it:"i compiti",de:"die Hausaufgaben",its:"Dopo la scuola deve finire i compiti prima di giocare.",des:"Nach der Schule muss er die Hausaufgaben fertig machen, bevor er spielt.",level:"B2",topic:"Children"},
{it:"sorvegliare",de:"beaufsichtigen",its:"Bisogna sempre sorvegliare i bambini quando giocano vicino all'acqua.",des:"Man sollte Kinder immer beaufsichtigen, wenn sie am Wasser spielen.",level:"B2",topic:"Children"},
{it:"i fratelli",de:"die Geschwister",its:"I fratelli litigano spesso, ma in fondo si vogliono bene.",des:"Die Geschwister streiten sich oft, aber im Grunde haben sie sich lieb.",level:"B2",topic:"Children"},
{it:"la gelosia",de:"die Eifersucht",its:"Dopo la nascita del secondo figlio, un po' di gelosia è normale.",des:"Nach der Geburt des zweiten Kindes ist ein wenig Eifersucht ganz normal.",level:"B2",topic:"Children"},
{it:"rimproverare",de:"schimpfen",its:"Invece di rimproverarlo subito, cerco di spiegargli l'errore.",des:"Anstatt sofort mit ihm zu schimpfen, versuche ich, ihm den Fehler zu erklären.",level:"B2",topic:"Children"},
{it:"la ricompensa",de:"die Belohnung",its:"Come ricompensa per i buoni voti, andremo al cinema.",des:"Als Belohnung für die guten Noten gehen wir ins Kino.",level:"B2",topic:"Children"},
{it:"obbediente",de:"gehorsam",its:"Non pretendo un figlio sempre obbediente, ma rispettoso sì.",des:"Ich erwarte kein immer gehorsames Kind, aber ein respektvolles schon.",level:"B2",topic:"Children"},
{it:"testardo",de:"stur",its:"È così testardo che non cambia idea nemmeno davanti ai fatti.",des:"Er ist so stur, dass er selbst angesichts der Fakten seine Meinung nicht ändert.",level:"B2",topic:"Children"},
{it:"sfinito",de:"erschöpft",its:"La sera, dopo aver messo a letto i bambini, siamo completamente sfiniti.",des:"Abends, nachdem wir die Kinder ins Bett gebracht haben, sind wir völlig erschöpft.",level:"B2",topic:"Children"},
{it:"la pazienza",de:"die Geduld",its:"Educare i figli richiede molta pazienza e coerenza.",des:"Kinder zu erziehen erfordert viel Geduld und Konsequenz.",level:"B2",topic:"Children"},
{it:"la responsabilità",de:"die Verantwortung",its:"Prendersi cura di un neonato è una grande responsabilità.",des:"Sich um einen Säugling zu kümmern, ist eine große Verantwortung.",level:"B2",topic:"Children"},
{it:"allattare",de:"stillen",its:"Ha deciso di allattare il bambino per i primi sei mesi.",des:"Sie hat beschlossen, das Baby die ersten sechs Monate zu stillen.",level:"B2",topic:"Children"},
{it:"il pediatra",de:"der Kinderarzt",its:"Portiamo la bambina dal pediatra per i controlli di routine.",des:"Wir bringen die Kleine für die Routineuntersuchungen zum Kinderarzt.",level:"B2",topic:"Children"},
{it:"coccolare",de:"kuscheln",its:"La sera ci piace coccolare i bambini leggendo una favola.",des:"Abends kuscheln wir gern mit den Kindern und lesen ein Märchen.",level:"B2",topic:"Children"},
{it:"il lettino",de:"das Kinderbett",its:"Abbiamo spostato il lettino accanto al nostro letto.",des:"Wir haben das Kinderbett neben unser Bett gestellt.",level:"B2",topic:"Children"},
{it:"brontolare",de:"meckern",its:"Smette di brontolare solo quando ottiene ciò che vuole.",des:"Er hört erst auf zu meckern, wenn er bekommt, was er will.",level:"B2",topic:"Children"},
{it:"affidare",de:"anvertrauen",its:"La sera affidiamo i bambini a una babysitter di fiducia.",des:"Abends vertrauen wir die Kinder einem zuverlässigen Babysitter an.",level:"B2",topic:"Children"},
{it:"le regole",de:"die Regeln",its:"In casa nostra le regole valgono per tutti, anche per gli adulti.",des:"Bei uns zu Hause gelten die Regeln für alle, auch für die Erwachsenen.",level:"B2",topic:"Children"},
{it:"lo sviluppo",de:"die Entwicklung",its:"Ogni bambino ha i suoi tempi di sviluppo e non serve fare paragoni.",des:"Jedes Kind hat sein eigenes Tempo in der Entwicklung, und Vergleiche bringen nichts.",level:"B2",topic:"Children"},
{it:"la cucina",de:"die Küche",its:"In cucina c'è sempre un buon odore quando la mamma cucina.",des:"In der Küche riecht es immer gut, wenn Mama kocht.",level:"B1",topic:"Household"},
{it:"cucinare",de:"kochen",its:"Il fine settimana mi piace cucinare qualcosa di speciale.",des:"Am Wochenende koche ich gern etwas Besonderes.",level:"B1",topic:"Household"},
{it:"lavare i piatti",de:"abwaschen",its:"Chi cucina non lava i piatti, questa è la regola.",des:"Wer kocht, wäscht nicht ab, das ist die Regel.",level:"B1",topic:"Household"},
{it:"la camera da letto",de:"das Schlafzimmer",its:"La nostra camera da letto è piccola ma accogliente.",des:"Unser Schlafzimmer ist klein, aber gemütlich.",level:"B1",topic:"Household"},
{it:"il salotto",de:"das Wohnzimmer",its:"La sera guardiamo la televisione in salotto.",des:"Abends schauen wir im Wohnzimmer fern.",level:"B1",topic:"Household"},
{it:"il bagno",de:"das Badezimmer",its:"Il bagno è occupato, puoi aspettare cinque minuti?",des:"Das Badezimmer ist besetzt, kannst du fünf Minuten warten?",level:"B1",topic:"Household"},
{it:"pulire",de:"putzen",its:"Il sabato mattina puliamo tutta la casa insieme.",des:"Am Samstagmorgen putzen wir zusammen die ganze Wohnung.",level:"B1",topic:"Household"},
{it:"la scopa",de:"der Besen",its:"Prendi la scopa, per favore, ci sono delle briciole sul pavimento.",des:"Hol bitte den Besen, auf dem Boden liegen Krümel.",level:"B1",topic:"Household"},
{it:"spazzare",de:"fegen",its:"Dopo cena spazzo sempre il pavimento della cucina.",des:"Nach dem Essen fege ich immer den Küchenboden.",level:"B1",topic:"Household"},
{it:"la finestra",de:"das Fenster",its:"Apri la finestra, fa caldo qui dentro.",des:"Mach das Fenster auf, hier drinnen ist es warm.",level:"B1",topic:"Household"},
{it:"la porta",de:"die Tür",its:"Chiudi la porta, per favore, entra freddo.",des:"Mach bitte die Tür zu, es zieht.",level:"B1",topic:"Household"},
{it:"il frigorifero",de:"der Kühlschrank",its:"Il latte è nel frigorifero, in alto a destra.",des:"Die Milch ist im Kühlschrank, oben rechts.",level:"B1",topic:"Household"},
{it:"il forno",de:"der Backofen",its:"Metto la pizza nel forno per dieci minuti.",des:"Ich schiebe die Pizza für zehn Minuten in den Backofen.",level:"B1",topic:"Household"},
{it:"la lavatrice",de:"die Waschmaschine",its:"La lavatrice ha finito, possiamo stendere i panni.",des:"Die Waschmaschine ist fertig, wir können die Wäsche aufhängen.",level:"B1",topic:"Household"},
{it:"il letto",de:"das Bett",its:"I bambini vanno a letto alle otto di sera.",des:"Die Kinder gehen um acht Uhr abends ins Bett.",level:"B1",topic:"Household"},
{it:"fare il letto",de:"das Bett machen",its:"Ogni mattina i bambini devono fare il letto.",des:"Jeden Morgen müssen die Kinder ihr Bett machen.",level:"B1",topic:"Household"},
{it:"la sedia",de:"der Stuhl",its:"Manca una sedia a tavola per il nostro ospite.",des:"Am Tisch fehlt ein Stuhl für unseren Gast.",level:"B1",topic:"Household"},
{it:"il tavolo",de:"der Tisch",its:"Mettiamo il regalo sul tavolo della cucina.",des:"Wir legen das Geschenk auf den Küchentisch.",level:"B1",topic:"Household"},
{it:"l'armadio",de:"der Schrank",its:"I vestiti puliti sono già nell'armadio.",des:"Die sauberen Kleider sind schon im Schrank.",level:"B1",topic:"Household"},

/* ============ storage ============ */
const LIB_KEY="lessico_lib_v1", SET_KEY="lessico_set_v1", KEY_KEY="lessico_key_v1";
const DEFAULTS={direction:"mixed",level:"all",topic:"all",sessionSize:30,learnY:3,deprecate:"forever",retireN:0,focus:"mixed",audioMode:"self",audioSentence:false};
const MODEL="claude-haiku-4-5"; // Claude model for word generation — swap for e.g. "claude-opus-4-8" for higher quality
const LANG={it:"it-IT",de:"de-DE"};
const ttsOK=("speechSynthesis" in window);
const SRClass=window.SpeechRecognition||window.webkitSpeechRecognition||null;
const srOK=!!SRClass;
let audioOn=false, audioGen=0, curRecog=null, audioStatus="", voicesCache=[];
let settings={...DEFAULTS};
let lib=[];
const uid=()=>(crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()));
const DAY=864e5;
function getKey(){try{return localStorage.getItem(KEY_KEY)||"";}catch(e){return "";}}
function setKey(k){try{if(k)localStorage.setItem(KEY_KEY,k);else localStorage.removeItem(KEY_KEY);}catch(e){}}

function norm(c){
  const it=(c.it&&typeof c.it==="object")?c.it:{word:c.it||"",sentence:c.its||""};
  const de=(c.de&&typeof c.de==="object")?c.de:{word:c.de||"",sentence:c.des||""};
  return {id:c.id||uid(),level:(c.level||"B1").toUpperCase(),topic:c.topic||"Other",
    it:{word:it.word||"",sentence:it.sentence||""},de:{word:de.word||"",sentence:de.sentence||""},
    streak:c.streak||0,correct:c.correct||0,seen:c.seen||0,learnedAt:c.learnedAt||null};
}
function load(){
  try{const s=localStorage.getItem(SET_KEY);if(s)settings={...DEFAULTS,...JSON.parse(s)};}catch(e){}
  try{const l=localStorage.getItem(LIB_KEY);
    if(l){const arr=JSON.parse(l);if(Array.isArray(arr)&&arr.length){lib=arr.map(norm);return;}}
  }catch(e){}
  lib=SEED.map(norm);saveLib();
}
function saveSet(){try{localStorage.setItem(SET_KEY,JSON.stringify(settings));}catch(e){}}
let t=null;
function saveLib(){if(t)clearTimeout(t);t=setTimeout(()=>{t=null;try{localStorage.setItem(LIB_KEY,JSON.stringify(lib));}catch(e){}},300);}
function saveLibNow(){if(t)clearTimeout(t);t=null;try{localStorage.setItem(LIB_KEY,JSON.stringify(lib));}catch(e){}}
window.addEventListener("pagehide",saveLibNow);
document.addEventListener("visibilitychange",()=>{if(document.hidden)saveLibNow();});

/* ============ learning model ============ */
function status(c){
  if(settings.retireN>0&&c.correct>=settings.retireN)return "mastered";
  if(c.streak>=settings.learnY){
    if(settings.deprecate==="forever")return "learned";
    const iv=settings.deprecate==="week"?7:30;
    return Date.now()>=((c.learnedAt||0)+iv*DAY)?"refresh":"learned";
  }
  return "learning";
}
const eligible=c=>{const s=status(c);return s==="learning"||s==="refresh";};
const inFilter=c=>(settings.level==="all"||c.level===settings.level)&&(settings.topic==="all"||c.topic===settings.topic);
const front=()=>settings.direction==="it"||settings.direction==="de"?settings.direction:(Math.random()<.5?"it":"de");
const focusMatch=c=>settings.focus==="seen"?c.seen>0:settings.focus==="new"?!c.seen:true;
const inSession=c=>inFilter(c)&&eligible(c)&&focusMatch(c);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ============ session ============ */
let session=null, flipped=false, view="session";
function startSession(){
  const pool=shuffle(lib.filter(inSession));
  const chosen=pool.slice(0,Math.max(1,settings.sessionSize|0));
  session={queue:chosen.map(c=>({id:c.id,f:front()})),total:chosen.length,learned:0,active:chosen.length>0};
  flipped=false;
}
const cur=()=>session&&session.queue[0]?lib.find(c=>c.id===session.queue[0].id):null;
function rate(known){
  const head=session.queue[0];const c=lib.find(x=>x.id===head.id);if(!c)return;
  const was=c.streak>=settings.learnY;
  c.seen=(c.seen||0)+1;
  if(known){c.correct++;c.streak++;if(c.streak>=settings.learnY){if(!was)session.learned++;c.learnedAt=Date.now();}}
  else{c.streak=0;c.learnedAt=null;}
  saveLib();
  session.queue=known?session.queue.slice(1):[...session.queue.slice(1),{id:head.id,f:front()}];
  flipped=false;
  if(!session.queue.length)session.active=false;
}
function assess(known){rate(known);paintSession();}

/* ============ tiny DOM helper ============ */
function el(tag,props,kids){const e=document.createElement(tag);
  if(props)for(const k in props){const v=props[k];
    if(k==="class")e.className=v;else if(k==="html")e.innerHTML=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2),v);
    else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(v!=null&&v!==false)e.setAttribute(k,v);}
  (kids||[]).forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;}

/* ============ render ============ */
const app=document.getElementById("app"), tabs=document.getElementById("tabs");
let search="", page=0; const PAGE=50; let addOpen=false, genOpen=false, listLevel="all", listTopic="all";

function render(){
  app.innerHTML="";
  const st={};lib.forEach(c=>{const s=status(c);st[s]=(st[s]||0)+1;});
  app.appendChild(el("div",{class:"head"},[
    el("span",{class:"logo",html:"lessico<i>.</i>"}),
    el("div",{class:"counts"},[el("div",{html:"<b>"+(st.learning||0)+"</b> learning"}),el("div",{},[(st.learned||0)+" learned"+(st.mastered?" · "+st.mastered+" mastered":"")])])
  ]));
  if(view==="session")paintSessionView();
  else if(view==="words")paintWords();
  else paintSettings();
  tabs.innerHTML="";
  [["session","Session"],["words","Words"],["settings","Settings"]].forEach(([id,label])=>{
    tabs.appendChild(el("button",{class:view===id?"on":"",onclick:()=>{stopAudio();view=id;if(id==="words"){search="";page=0;}render();}},[label]));
  });
}

/* ---- session ---- */
function paintSessionView(){app.appendChild(el("div",{id:"sess"}));paintSession();}
function paintSession(){
  const area=document.getElementById("sess");if(!area)return;area.innerHTML="";
  if(!session||!session.active){
    const avail=lib.filter(inSession).length;
    const done=session&&session.total>0;
    area.appendChild(el("div",{class:"state"},[
      el("p",{class:"big"},[done?"Session complete":(avail?"Ready when you are":"All caught up")]),
      el("p",{},[done?("You worked through "+session.total+" words"+(session.learned?" and learned "+session.learned:"")+"."):(avail?("Up to "+settings.sessionSize+" words from your current filter."):"Nothing to learn under this filter. Change filters or add words.")]),
      avail?el("button",{class:"btn wide",style:{maxWidth:"260px",margin:"0 auto"},onclick:()=>{startSession();paintSession();}},[done?"New session":"Start session"]):null
    ]));
    return;
  }
  const c=cur(), donePart=session.total-session.queue.length;
  area.appendChild(el("div",{class:"meta"},[el("span",{},[session.queue.length+" left"]),el("span",{},[session.learned+" learned"])]));
  area.appendChild(el("div",{class:"progress"},[el("i",{style:{width:Math.round(donePart/session.total*100)+"%"}})]));
  const f=session.queue[0].f, b=f==="it"?"de":"it";
  if(ttsOK){
    const mseg=el("div",{class:"seg"});
    [["self","Self-assess"],["auto","Auto-rate"]].forEach(o=>mseg.appendChild(el("button",{class:settings.audioMode===o[0]?"on":"",onclick:()=>{settings.audioMode=o[0];saveSet();if(!audioOn)paintSession();}},[o[1]])));
    area.appendChild(el("div",{class:"atools"},[
      el("button",{class:"ghost",title:"Hear it",onclick:()=>speakCard(c,f)},["🔊"]),
      audioOn?el("button",{class:"ghost dngr",onclick:()=>{stopAudio();paintSession();}},["■ Stop"]):el("button",{class:"ghost",onclick:runHandsFree},["▶ Hands-free"]),
      mseg
    ]));
  }
  const card=el("div",{class:"card"+(flipped?" flip":""),onclick:()=>{if(audioOn)return;flipped=!flipped;card.classList.toggle("flip",flipped);paintButtons();}},[face(c,f,false),face(c,b,true)]);
  area.appendChild(el("div",{class:"scene"},[card]));
  area.appendChild(el("div",{id:"btns"}));
  paintButtons();
}
function face(c,lang,back){
  const s=c[lang];
  return el("div",{class:"face"+(back?" back":"")},[
    el("div",{class:"spine",style:{background:lang==="it"?"#7A9A57":"#CB9235"}}),
    el("h2",{class:"word"},[s.word]),
    s.sentence?el("p",{class:"sentence"},[s.sentence]):null,
    el("div",{class:"foot"},[
      el("span",{class:"dots"},Array.from({length:settings.learnY},(_,i)=>el("span",{class:i<c.streak?"f":""}))),
      status(c)==="refresh"?el("span",{class:"rtag"},["refresh"]):null
    ])
  ]);
}
function paintButtons(){
  const a=document.getElementById("btns");if(!a)return;a.innerHTML="";
  if(audioOn){a.appendChild(el("div",{class:"astat",id:"astat"},[audioStatus||"…"]));return;}
  if(!flipped)a.appendChild(el("div",{class:"assess"},[el("button",{class:"btn wide",onclick:()=>{flipped=true;document.querySelector(".card").classList.add("flip");paintButtons();}},["Show answer"])]));
  else a.appendChild(el("div",{class:"assess"},[
    el("button",{class:"btn miss",onclick:()=>assess(false)},["✕ Missed"]),
    el("button",{class:"btn know",onclick:()=>assess(true)},["✓ Knew it"])
  ]));
}

  app.appendChild(s);
  const seg=(opts,val,on)=>{const d=el("div",{class:"seg"});opts.forEach(o=>d.appendChild(el("button",{class:val===o[0]?"on":"",onclick:()=>on(o[0])},[o[1]])));return d;};

  app.appendChild(el("div",{class:"field"},[el("label",{},["Level"]),seg([["all","All"],...levels.map(l=>[l,l])],listLevel,v=>{listLevel=v;page=0;render();})]));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Topic"]),seg([["all","All"],...topics.map(x=>[x,x])],listTopic,v=>{listTopic=v;page=0;render();})]));

function paintList(){

  const q=search.trim().toLowerCase();
  const all=lib.filter(c=>(listLevel==="all"||c.level===listLevel)&&(listTopic==="all"||c.topic===listTopic)&&(!q||c.it.word.toLowerCase().includes(q)||c.de.word.toLowerCase().includes(q)));
  const pages=Math.max(1,Math.ceil(all.length/PAGE));if(page>=pages)page=pages-1;
  const slice=all.slice(page*PAGE,page*PAGE+PAGE);
  w.appendChild(el("div",{class:"hint"},[all.length+" words"]));
  slice.forEach(c=>{const s=status(c);
    w.appendChild(el("div",{class:"row"},[
      el("div",{class:"pair"},[el("div",{class:"a"},[c.it.word]),el("div",{class:"b"},[c.de.word])]),
      el("span",{class:"st "+(s==="learning"?"learning":s==="mastered"?"mastered":"learned")},[s==="learning"?(Math.min(c.streak,settings.learnY)+"/"+settings.learnY):s]),
      el("button",{class:"del",html:"✕",onclick:()=>{if(confirm('Delete "'+c.it.word+'"?')){lib=lib.filter(x=>x.id!==c.id);if(session)session.queue=session.queue.filter(z=>z.id!==c.id);saveLibNow();render();}}})
    ]));

  ]));
}

  const num=(val,min,on)=>{const i=el("input",{class:"inp",type:"number",min:String(min),value:String(val)});i.addEventListener("change",()=>{let n=parseInt(i.value,10);if(isNaN(n)||n<min)n=min;i.value=n;on(n);});return el("div",{class:"numrow"},[i]);};

  app.appendChild(el("div",{class:"sec first"},["Study"]));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Direction (front side)"]),seg([["mixed","Mixed"],["it","IT → DE"],["de","DE → IT"]],settings.direction,v=>{settings.direction=v;saveSet();})]));
  const levels=["A1","A2","B1","B2","C1","C2"].filter(l=>lib.some(c=>c.level===l));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Level"]),seg([["all","All"],...levels.map(l=>[l,l])],settings.level,v=>{settings.level=v;saveSet();})]));
  const topics=Array.from(new Set(lib.map(c=>c.topic)));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Topic"]),seg([["all","All"],...topics.map(x=>[x,x])],settings.topic,v=>{settings.topic=v;saveSet();})]));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Focus"]),seg([["mixed","Mixed"],["seen","Seen only"],["new","New only"]],settings.focus,v=>{settings.focus=v;session=null;saveSet();}),el("span",{class:"sub"},["“Seen only” drills words you've already been tested on; “New only” shows untested ones."])]));

  app.appendChild(el("div",{class:"sec"},["Learning"]));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Words per session (max)"]),num(settings.sessionSize,1,n=>{settings.sessionSize=n;saveSet();})]));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Correct in a row to mark learned"]),num(settings.learnY,1,n=>{settings.learnY=n;saveSet();}),el("span",{class:"sub"},["Learned words leave sessions to make room for new ones."])]));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Bring learned words back after…"]),seg([["forever","Never"],["month","1 month"],["week","1 week"]],settings.deprecate,v=>{settings.deprecate=v;saveSet();})]));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Retire after N total correct (0 = off)"]),num(settings.retireN,0,n=>{settings.retireN=n;saveSet();}),el("span",{class:"sub"},["Once right this many times ever, a word never returns."])]));

  app.appendChild(el("div",{class:"sec"},["Voice"]));
  if(!ttsOK){
    app.appendChild(el("div",{class:"hint"},["This browser doesn’t support speech, so the hands-free reader is unavailable."]));
  }else{
    app.appendChild(el("div",{class:"field"},[el("label",{},["Hands-free rating"]),seg([["self","Self-assess"],["auto","Auto-rate"]],settings.audioMode,v=>{settings.audioMode=v;saveSet();}),el("span",{class:"sub"},["Self-assess reads the card, then you say “yes” or “no”. Auto-rate listens to you say the translation and scores it for you."])]));
    app.appendChild(el("div",{class:"field"},[el("label",{},["Read example sentences too"]),seg([["off","Off"],["on","On"]],settings.audioSentence?"on":"off",v=>{settings.audioSentence=(v==="on");saveSet();})]));
    app.appendChild(el("div",{class:"hint",style:{marginTop:"10px"}},[srOK?"Start it with the ▶ Hands-free button on the Session tab. Needs microphone permission (works on https).":"Voice input needs a Chromium-based browser (Chrome/Edge). Without it, ▶ Hands-free reads each card aloud and you tap ✓/✕ to rate."]));
  }

  app.appendChild(el("div",{class:"sec"},["Claude"]));
  const keyInput=el("input",{class:"inp",type:"password",placeholder:"sk-ant-…",value:getKey()});
  app.appendChild(el("div",{class:"field"},[el("label",{},["Anthropic API key"]),keyInput,el("span",{class:"sub"},[getKey()?"Key saved on this device.":"Paste your Anthropic API key to enable word generation."])]));
  app.appendChild(el("div",{class:"btnwrap"},[
    el("button",{class:"solid",onclick:()=>{setKey(keyInput.value.trim());render();}},["Save key"]),
    el("button",{class:"ghost dngr",onclick:()=>{setKey("");render();}},["Clear key"])
  ]));
  app.appendChild(el("div",{class:"hint",style:{marginTop:"10px"}},["Stored only in this browser — never uploaded or committed. Powers Auto-fill and Generate on the Words tab, via Claude ("+MODEL+")."]));

  app.appendChild(el("div",{class:"sec"},["Data"]));
  app.appendChild(el("div",{class:"btnwrap"},[
    el("button",{class:"ghost",onclick:exportLib},["Export (.json)"]),
    el("button",{class:"ghost",onclick:importLib},["Import"]),
    el("button",{class:"ghost dngr",onclick:()=>{if(confirm("Reset all progress? Words stay, scores go to zero.")){lib=lib.map(c=>({...c,streak:0,correct:0,learnedAt:null}));saveLibNow();session=null;render();}}},["Reset progress"])
  ]));
  app.appendChild(el("div",{class:"hint",style:{marginTop:"10px"}},["Export saves your whole library with scores — use it as a backup or to move phones."]));
}
function exportLib(){const blob=new Blob([JSON.stringify(lib,null,2)],{type:"application/json"});const a=el("a",{href:URL.createObjectURL(blob),download:"lessico.json"});document.body.appendChild(a);a.click();a.remove();}
function importLib(){const inp=el("input",{type:"file",accept:".json,application/json"});inp.addEventListener("change",()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(Array.isArray(d)&&d.length){lib=d.map(norm);saveLibNow();session=null;render();}else alert("Not a valid file.");}catch(e){alert("Could not read that file.");}};r.readAsText(f);});inp.click();}

/* ============ Claude integration ============ */
const SYS='You create Italian–German vocabulary flashcards for a language learner. Italian and German nouns must include the definite article (e.g. "la casa", "das Haus"). Example sentences must be natural, everyday, correct, and appropriate to the requested CEFR level; the Italian and German example sentences must be faithful translations of each other. Use only real, correct vocabulary.';
const clean=s=>(s||"").trim().toLowerCase().replace(/\s+/g," ");
function existsWord(it,de){const i=clean(it),d=clean(de);return lib.some(c=>clean(c.it.word)===i||clean(c.de.word)===d);}
async function claudeJSON(user,schema,maxTokens){
  const key=getKey();
  if(!key)throw new Error("No API key set — add one in Settings.");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:MODEL,max_tokens:maxTokens||8000,system:SYS,messages:[{role:"user",content:user}],output_config:{format:{type:"json_schema",schema:schema}}})
  });
  if(!res.ok){let m=res.status+" "+res.statusText;try{const e=await res.json();if(e&&e.error&&e.error.message)m=e.error.message;}catch(_){}throw new Error("Claude API: "+m);}
  const data=await res.json();
  const tb=(data.content||[]).find(b=>b.type==="text");
  if(!tb)throw new Error("Empty response from Claude.");
  return JSON.parse(tb.text);
}
async function genWords(n,level,topic){
  const existing=lib.map(c=>c.it.word).join("; ");
  const item={type:"object",additionalProperties:false,required:["it","de","its","des"],properties:{it:{type:"string"},de:{type:"string"},its:{type:"string"},des:{type:"string"}}};
  const schema={type:"object",additionalProperties:false,required:["words"],properties:{words:{type:"array",items:item}}};
  const user='Generate '+n+' Italian–German vocabulary words for the topic "'+topic+'" at CEFR level '+level+'. For each provide: it (Italian, with article if a noun), de (German translation, with article if a noun), its (a natural Italian example sentence using the word), des (the German translation of that sentence). Do NOT include any of these words that already exist: '+existing;
  const out=await claudeJSON(user,schema,8000);
  const words=(out&&out.words)||[];
  let added=0,skipped=0;
  words.forEach(w=>{
    if(!w.it||!w.de||existsWord(w.it,w.de)){skipped++;return;}
    lib.unshift(norm({it:w.it,de:w.de,its:w.its,des:w.des,level:level,topic:topic}));added++;
  });
  if(added)saveLibNow();
  return {added:added,skipped:skipped};
}
async function assistCard(it,de){
  const schema={type:"object",additionalProperties:false,required:["it","de","its","des"],properties:{it:{type:"string"},de:{type:"string"},its:{type:"string"},des:{type:"string"}}};
  const given=[it?("Italian word: "+it):"",de?("German word: "+de):""].filter(Boolean).join("\n");
  const user="Complete this Italian–German flashcard.\n"+given+"\nReturn: it (Italian, with article if a noun), de (German translation, with article if a noun), its (a natural Italian example sentence using the word), des (the German translation of that sentence). Keep any word already provided.";
  return claudeJSON(user,schema,1000);
}

/* ============ hands-free audio ============ */
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const alive=gen=>audioOn&&gen===audioGen;
function loadVoices(){try{voicesCache=speechSynthesis.getVoices()||[];}catch(e){voicesCache=[];}}
function pickVoice(lang){const p=lang.slice(0,2).toLowerCase();if(!voicesCache.length)loadVoices();
  return voicesCache.find(v=>v.lang&&v.lang.toLowerCase().replace("_","-")===lang.toLowerCase())
    ||voicesCache.find(v=>v.lang&&v.lang.toLowerCase().slice(0,2)===p)||null;}
if(ttsOK){loadVoices();try{speechSynthesis.onvoiceschanged=loadVoices;}catch(e){}}
function speak(text,lang){return new Promise(res=>{
  if(!ttsOK||!text){res();return;}
  let done=false;const fin=()=>{if(done)return;done=true;res();};
  try{speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);u.lang=lang;const v=pickVoice(lang);if(v)u.voice=v;u.rate=.95;
    u.onend=fin;u.onerror=fin;speechSynthesis.speak(u);
    setTimeout(fin,Math.min(12000,1500+text.length*90));
  }catch(e){fin();}
});}
function listen(lang,timeout){return new Promise(res=>{
  if(!srOK){res("");return;}
  let done=false,to=null;
  const fin=v=>{if(done)return;done=true;if(to)clearTimeout(to);try{r.stop();}catch(e){}if(curRecog===r)curRecog=null;res(v);};
  const r=new SRClass();curRecog=r;r.lang=lang;r.interimResults=false;r.maxAlternatives=1;r.continuous=false;
  r.onresult=e=>{try{fin((e.results[0][0].transcript||"").trim());}catch(_){fin("");}};
  r.onerror=()=>fin("");r.onend=()=>fin("");
  to=setTimeout(()=>fin(""),timeout||6000);
  try{r.start();}catch(e){fin("");}
});}
function normWord(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
  .replace(/['’]/g," ").replace(/[^a-z\s]/g," ")
  .replace(/\b(il|lo|la|i|gli|le|un|uno|una|der|die|das|den|dem|des|ein|eine|einen|einem|to|the|sich)\b/g," ")
  .replace(/\s+/g," ").trim();}
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  const d=Array.from({length:n+1},(_,i)=>i);
  for(let i=1;i<=m;i++){let prev=d[0];d[0]=i;for(let j=1;j<=n;j++){const t=d[j];d[j]=Math.min(d[j]+1,d[j-1]+1,prev+(a[i-1]===b[j-1]?0:1));prev=t;}}return d[n];}
function similar(said,target){
  const a=normWord(said),b=normWord(target);if(!a||!b)return false;if(a===b)return true;
  const at=a.split(" ").filter(Boolean),bt=b.split(" ").filter(Boolean);
  const hit=bt.filter(tb=>at.some(ta=>ta===tb||(tb.length>3&&(ta.includes(tb)||tb.includes(ta)))||lev(ta,tb)<=Math.max(1,Math.floor(tb.length/4)))).length;
  if(bt.length===1?hit>=1:hit>=bt.length)return true;
  return lev(a,b)/Math.max(a.length,b.length)<=0.34;
}
function parseYesNo(t){const s=(t||"").toLowerCase();if(!s)return null;
  if(/\b(no|nope|nah|nein|falsch|sbagliat\w*|wrong|missed|miss|forgot)\b/.test(s))return false;
  if(/\b(yes|yeah|yep|yup|right|correct|knew|know|known|got|ja|genau|richtig|si|s[iì]|ok|okay|good)\b/.test(s))return true;
  return null;}
async function listenYesNo(gen){
  for(let k=0;k<2;k++){if(!alive(gen))return null;
    const yn=parseYesNo(await listen("en-US",6000));
    if(yn!==null)return yn;
    if(k===0)setAStat("🎙 Yes or no?");}
  return null;}
function setAStat(s){audioStatus=s;const e=document.getElementById("astat");if(e)e.textContent=s;}
function reveal(){flipped=true;const cd=document.querySelector(".card");if(cd)cd.classList.add("flip");}
function speakCard(c,f){if(!ttsOK)return;speak(c[f].word,LANG[f]);}
function stopAudio(){audioOn=false;audioGen++;audioStatus="";try{if(ttsOK)speechSynthesis.cancel();}catch(e){}if(curRecog){try{curRecog.abort();}catch(e){}curRecog=null;}}
async function runHandsFree(){
  if(!ttsOK)return;
  stopAudio();audioGen++;const gen=audioGen;audioOn=true;audioStatus="";
  if(!session||!session.active)startSession();
  paintSession();
  try{
    while(alive(gen)&&session&&session.active){
      const head=session.queue[0],c=cur();if(!c)break;
      const f=head.f,b=f==="it"?"de":"it";
      flipped=false;const cd=document.querySelector(".card");if(cd)cd.classList.remove("flip");
      setAStat("🔊 "+(f==="it"?"Italian":"German")+"…");
      await speak(c[f].word,LANG[f]);
      if(settings.audioSentence&&c[f].sentence)await speak(c[f].sentence,LANG[f]);
      if(!alive(gen))break;
      let known;
      if(settings.audioMode==="auto"&&srOK){
        setAStat("🎙 Say it in "+(b==="it"?"Italian":"German")+"…");
        const said=await listen(LANG[b],7000);
        if(!alive(gen))break;
        known=similar(said,c[b].word);
        reveal();setAStat((known?"✓ ":"✕ ")+(said?("“"+said+"”"):"(no answer)"));
        await speak(c[b].word,LANG[b]);
      }else{
        await wait(1300);if(!alive(gen))break;
        reveal();setAStat("🔊 "+(b==="it"?"Italian":"German")+"…");
        await speak(c[b].word,LANG[b]);
        if(settings.audioSentence&&c[b].sentence)await speak(c[b].sentence,LANG[b]);
        if(!alive(gen))break;
        if(srOK){
          setAStat("🎙 Knew it? Say “yes” or “no”.");
          known=await listenYesNo(gen);
          if(!alive(gen))break;
          if(known===null){setAStat("Didn’t catch that — tap ✓ or ✕.");audioOn=false;paintSession();return;}
        }else{setAStat("Tap ✓ or ✕ to rate.");audioOn=false;paintSession();return;}
      }
      if(!alive(gen))break;
      await wait(450);
      rate(known);
      if(alive(gen)&&session.active)paintSession();
    }
  }catch(e){}
  if(gen===audioGen)audioOn=false;
  if(session&&!session.active)paintSession();
}

/* ============ boot ============ */
load();
startSession();
render();
