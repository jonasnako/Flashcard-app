<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1E2D2F" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>lessico</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#1E2D2F;--bg-2:#223335;--paper:#F6F1E6;--paper-edge:#EBE3D2;--ink:#2A2823;--ink-soft:#6C665A;--line:rgba(246,241,230,0.10);--green:#7A9A57;--ochre:#CB9235}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(120% 120% at 50% 0%,var(--bg-2) 0%,var(--bg) 60%) fixed;color:var(--paper);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:620px;margin:0 auto;padding:max(24px,env(safe-area-inset-top)) 20px calc(84px + env(safe-area-inset-bottom))}
.head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:18px}
.brand{display:flex;align-items:baseline;gap:12px}
.logo{font-family:'Fraunces',serif;font-weight:600;font-size:28px;letter-spacing:-.02em;line-height:1}
.logo .dot{color:var(--green)}
.tagline{font-size:12px;color:rgba(246,241,230,.5);letter-spacing:.14em;text-transform:uppercase}
.counts{text-align:right;font-size:12px;color:rgba(246,241,230,.55);line-height:1.5}
.counts b{color:var(--paper);font-weight:600}
.rowlabel{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:rgba(246,241,230,.42);width:60px;flex:none}
.ctrlrow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:12px}
.chip{font-family:inherit;font-size:12px;font-weight:500;color:rgba(246,241,230,.6);background:rgba(246,241,230,.05);border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;transition:.16s;display:inline-flex;align-items:center;gap:6px}
.chip.on{background:rgba(122,154,87,.18);border-color:rgba(122,154,87,.5);color:#CDE0B4}
.chip.mic.on{background:rgba(203,146,53,.2);border-color:rgba(203,146,53,.55);color:#EAC98A}
.hint{font-size:12px;color:rgba(246,241,230,.5);line-height:1.5;margin:0 0 14px}
.hint.warn{color:#E7B77B}
.scene{perspective:1600px;margin-bottom:18px}
.card{position:relative;width:100%;min-height:clamp(280px,44vw,350px);transform-style:preserve-3d;transition:transform .58s cubic-bezier(.2,.85,.25,1);cursor:pointer}
.card.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--paper);color:var(--ink);border-radius:18px;padding:16px 26px 22px;display:flex;flex-direction:column;box-shadow:0 22px 44px -20px rgba(0,0,0,.55),0 2px 0 var(--paper-edge);overflow:hidden}
.face.back{transform:rotateY(180deg)}
.spine{position:absolute;left:0;top:0;bottom:0;width:7px}
.facetop{display:flex;align-items:center;justify-content:flex-end;min-height:34px}
.iconbtn{width:36px;height:36px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(42,40,35,.05);border:1px solid rgba(42,40,35,.14);color:var(--ink-soft)}
.iconbtn:hover{background:rgba(42,40,35,.1);color:var(--ink)}
.body{flex:1;display:flex;flex-direction:column;justify-content:center}
.word{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(30px,8vw,44px);line-height:1.05;letter-spacing:-.02em;margin:0}
.sentence{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:clamp(16px,4.4vw,19px);line-height:1.5;color:#4A463C;margin-top:14px;max-width:42ch}
.foot{display:flex;align-items:center;justify-content:space-between;padding-top:16px}
.dots{display:inline-flex;gap:5px;flex-wrap:wrap}
.dots span{width:7px;height:7px;border-radius:999px;background:rgba(42,40,35,.16)}
.dots span.f{background:var(--ink)}
.refresh-tag{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ochre)}
.progress{height:5px;border-radius:999px;background:rgba(246,241,230,.08);overflow:hidden;margin:2px 0 16px}
.progress i{display:block;height:100%;background:var(--green);transition:width .3s}
.sessmeta{display:flex;justify-content:space-between;font-size:12px;color:rgba(246,241,230,.55);margin-bottom:6px}
.assess{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.btn{font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border-radius:13px;padding:15px 16px;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:transform .12s,filter .18s;color:var(--paper);background:rgba(246,241,230,.06)}
.btn:active{transform:translateY(1px) scale(.99)}
.btn.miss{background:rgba(203,146,53,.14);border-color:rgba(203,146,53,.4);color:#EAC98A}
.btn.know{background:rgba(122,154,87,.16);border-color:rgba(122,154,87,.45);color:#BBD69A}
.btn.wide{grid-column:1/-1;background:var(--paper);color:var(--ink);border-color:transparent}
.kbd{font-size:11px;opacity:.55;font-weight:500}
.result{background:rgba(246,241,230,.05);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.result .rlabel{font-weight:600;font-size:14px;margin-bottom:6px}
.result .rrow{color:rgba(246,241,230,.65);font-size:13px;line-height:1.7}
.result b{color:var(--paper);font-weight:600;font-family:'Fraunces',serif}
.state{text-align:center;padding:34px 18px}
.state .big{font-family:'Fraunces',serif;font-size:24px;font-weight:500;margin:0 0 8px}
.state p{color:rgba(246,241,230,.6);font-size:14.5px;line-height:1.55;margin:0 auto 18px;max-width:34ch}
.sec{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:rgba(246,241,230,.42);margin:22px 0 10px;padding-top:16px;border-top:1px solid var(--line)}
.sec.first{border-top:0;padding-top:0;margin-top:6px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;color:rgba(246,241,230,.72)}
.field .sub{font-size:11.5px;color:rgba(246,241,230,.42);line-height:1.4}
.inp{font-family:inherit;font-size:15px;color:var(--paper);background:rgba(246,241,230,.05);border:1px solid var(--line);border-radius:11px;padding:11px 13px;outline:none;width:100%}
.inp:focus{border-color:rgba(246,241,230,.34);background:rgba(246,241,230,.08)}
select.inp{appearance:none}
.numrow{display:flex;align-items:center;gap:12px}
.numrow .inp{width:100px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:inline-flex;background:rgba(246,241,230,.06);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px;flex-wrap:wrap}
.seg button{font-family:inherit;font-size:12.5px;font-weight:500;color:rgba(246,241,230,.6);background:transparent;border:0;cursor:pointer;padding:6px 13px;border-radius:999px}
.seg button.on{background:var(--paper);color:var(--ink)}
.solid{font-family:inherit;font-weight:600;font-size:14px;color:var(--ink);background:var(--paper);border:0;border-radius:11px;padding:11px 16px;cursor:pointer}
.ghost{font-family:inherit;font-weight:500;font-size:13px;color:rgba(246,241,230,.78);background:rgba(246,241,230,.05);border:1px solid var(--line);border-radius:11px;padding:10px 14px;cursor:pointer}
.ghost:disabled{opacity:.45}
.dngr{color:#E7B77B;border-color:rgba(231,183,123,.3)}
.btnwrap{display:flex;gap:8px;flex-wrap:wrap}
.err{color:#E7B77B;font-size:13px;margin-top:8px}
.search{width:100%;margin-bottom:12px}
.row{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line)}
.row .pair{flex:1;min-width:0}
.row .it{font-family:'Fraunces',serif;font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .de{font-size:13px;color:rgba(246,241,230,.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .st{font-size:10px;font-weight:600;letter-spacing:.04em;border-radius:5px;padding:3px 6px;white-space:nowrap}
.st.learning{color:#CDE0B4;border:1px solid rgba(122,154,87,.4)}
.st.learned{color:#EAC98A;border:1px solid rgba(203,146,53,.4)}
.st.mastered{color:var(--paper);border:1px solid var(--line);background:rgba(246,241,230,.08)}
.row .del{background:none;border:0;color:rgba(246,241,230,.35);cursor:pointer;padding:4px;display:inline-flex}
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:13px;color:rgba(246,241,230,.6)}
.tabs{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(30,45,47,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.tabs button{flex:1;background:none;border:0;color:rgba(246,241,230,.5);font-family:inherit;font-size:11px;font-weight:500;padding:11px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.tabs button.on{color:var(--paper)}
.spin{animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.card{transition:none}.spin{animation:none}}
svg{display:block}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<nav class="tabs" id="tabs"></nav>

<script src="words.js"></script>
<script>
"use strict";
const DECK_KEY="lessico_deck_v3", SET_KEY="lessico_settings_v1";
const DEFAULT_SETTINGS={direction:"mixed",level:"all",topic:"all",autoSpeak:true,readSentence:true,sessionSize:30,learnY:3,deprecate:"forever",retireN:0,answerMode:"self"};
let settings={...DEFAULT_SETTINGS};
function loadSettings(){try{const r=localStorage.getItem(SET_KEY);if(r)settings={...DEFAULT_SETTINGS,...JSON.parse(r)};}catch(e){}}
function saveSettings(){try{localStorage.setItem(SET_KEY,JSON.stringify(settings));}catch(e){}}

const uid=()=>(crypto&&crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()));
const now=()=>Date.now(), DAY=864e5;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function normalizeCard(c){
  const it=(c.it&&typeof c.it==="object")?c.it:{word:c.it||"",sentence:c.its||""};
  const de=(c.de&&typeof c.de==="object")?c.de:{word:c.de||"",sentence:c.des||""};
  return {id:c.id||uid(),level:(c.level||"B1").toUpperCase(),topic:c.topic||"Added",
    it:{word:it.word||"",sentence:it.sentence||""},de:{word:de.word||"",sentence:de.sentence||""},
    streak:c.streak||0,correct:c.correct||0,seen:c.seen||0,learnedAt:c.learnedAt||null};
}
const seedList=()=>(window.LESSICO_SEED||[]).map(normalizeCard);

let deck=[], session=null, flipped=false, handsFree=false, view="session", cardEl=null;
let searchText="", page=0; const PAGE=50;
let answerState="prompt", saidText="", gradedOk=null, answerRec=null;

function loadDeck(){try{const raw=localStorage.getItem(DECK_KEY);if(raw)deck=JSON.parse(raw).map(normalizeCard);else{deck=seedList();saveDeckNow();}}catch(e){deck=seedList();}}
let saveTimer=null;
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(saveDeckNow,450);}
function saveDeckNow(){saveTimer=null;try{localStorage.setItem(DECK_KEY,JSON.stringify(deck));}catch(e){}}

function cardStatus(c){
  if(settings.retireN>0&&c.correct>=settings.retireN)return "mastered";
  if(c.streak>=settings.learnY){
    if(settings.deprecate==="forever")return "learned";
    const iv=settings.deprecate==="week"?7:30;
    return now()>=((c.learnedAt||0)+iv*DAY)?"refresh":"learned";
  }
  return "learning";
}
const isEligible=c=>{const s=cardStatus(c);return s==="learning"||s==="refresh";};
const matchesFilter=c=>(settings.level==="all"||c.level===settings.level)&&(settings.topic==="all"||c.topic===settings.topic);
function pickFront(){return settings.direction==="it"||settings.direction==="de"?settings.direction:(Math.random()<.5?"it":"de");}

function startSession(){
  const pool=deck.filter(c=>matchesFilter(c)&&isEligible(c));
  shuffle(pool);
  const chosen=pool.slice(0,Math.max(1,settings.sessionSize|0));
  session={queue:chosen.map(c=>({id:c.id,front:pickFront()})),total:chosen.length,learnedThis:0,active:chosen.length>0};
  flipped=false;
}
function currentCard(){return session&&session.queue[0]?deck.find(c=>c.id===session.queue[0].id):null;}

let voices=[];
function loadVoices(){voices=window.speechSynthesis?speechSynthesis.getVoices():[];}
if(window.speechSynthesis){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function voiceFor(lang){const p=lang==="it"?"it":"de";return voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(p+"-"))||voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith(p))||null;}
let speaking=false;
function speak(text,lang){if(!window.speechSynthesis||!text)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang==="it"?"it-IT":"de-DE";const v=voiceFor(lang);if(v)u.voice=v;u.rate=.95;speaking=true;u.onend=u.onerror=()=>{speaking=false;};speechSynthesis.speak(u);}
function sideText(c,lang){const s=c[lang];return (settings.readSentence&&s.sentence)?s.word+". "+s.sentence:s.word;}
function speakVisible(){const c=currentCard();if(!c)return;const f=session.queue[0].front;const lang=flipped?(f==="it"?"de":"it"):f;speak(sideText(c,lang),lang);}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null,recRunning=false,wantListen=false;
const CMD={
  flip:["flip","show","answer","turn","gira","girala","mostra","umdrehen","zeig","zeige","antwort","lösung"],
  known:["knew","know","got it","yes","yeah","correct","right","si","sì","giusto","esatto","ja","gewusst","richtig","konnte"],
  missed:["miss","missed","no","not","wrong","nope","sbagliato","errato","nein","falsch","nicht","vergessen"],
  next:["next","skip","avanti","prossima","salta","weiter","nächste","überspringen"],
  repeat:["repeat","again","ancora","ripeti","nochmal","wiederhole","wiederholen"]
};
function matchCmd(t){t=" "+t.toLowerCase().replace(/[^\p{L}\s]/gu," ").replace(/\s+/g," ")+" ";for(const cat of ["flip","known","missed","next","repeat"])for(const kw of CMD[cat])if(t.includes(" "+kw+" "))return cat;return null;}
async function requestOnDevice(){if(!SR||!SR.available)return;try{const o={langs:[navigator.language||"de-DE","de-DE","it-IT","en-US"],processLocally:true};const s=await SR.available(o);if(s==="downloadable"&&SR.install)await SR.install(o);}catch(e){}}
function initRec(){if(!SR)return null;const r=new SR();r.lang=navigator.language||"de-DE";r.continuous=true;r.interimResults=false;r.maxAlternatives=1;try{if("processLocally" in r)r.processLocally=true;}catch(e){}
  r.onstart=()=>recRunning=true;r.onend=()=>{recRunning=false;if(wantListen)safeStart();};
  r.onerror=e=>{if(e.error==="not-allowed"||e.error==="service-not-allowed"){wantListen=false;handsFree=false;if(view==="session")render();}};
  r.onresult=e=>{if(speaking)return;const res=e.results[e.results.length-1];if(!res||!res.isFinal)return;const cmd=matchCmd(res[0].transcript);if(cmd)runCommand(cmd);};return r;}
function safeStart(){if(!rec||recRunning)return;try{rec.start();}catch(e){}}
function startListening(){if(!SR)return;wantListen=true;if(!rec)rec=initRec();requestOnDevice().finally(safeStart);}
function stopListening(){wantListen=false;if(rec&&recRunning){try{rec.abort();}catch(e){}}}
function runCommand(cmd){const c=currentCard();if(!c)return;
  if(cmd==="repeat"){speakVisible();return;}
  if(!flipped){if(cmd==="flip"||cmd==="known"||cmd==="missed"){doFlip();return;}if(cmd==="next"){skip();return;}}
  else{if(cmd==="known"){assess(true);return;}if(cmd==="missed"){assess(false);return;}if(cmd==="next"){skip();return;}if(cmd==="flip"){doFlip();return;}}}

/* ---- spoken-answer checking ---- */
const ARTICLES=/\b(il|lo|la|i|gli|le|l|un|uno|una|der|die|das|den|dem|des|ein|eine|einen|einem|einer|zu)\b/g;
function normalizeAns(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\p{L}\s]/gu," ").replace(ARTICLES," ").replace(/\s+/g," ").trim();}
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}
function isAnswerCorrect(said,target){const S=normalizeAns(said),T=normalizeAns(target);if(!S||!T)return false;if(S===T)return true;const Sw=S.split(" ").sort().join(" "),Tw=T.split(" ").sort().join(" ");if(Sw===Tw)return true;const Sp=" "+S+" ",Tp=" "+T+" ";if(Sp.includes(Tp)||Tp.includes(Sp))return true;return lev(S,T)<=Math.max(1,Math.floor(T.length*0.2));}
function gradeAnswer(said,alts,target){return [said,...(alts||[])].some(s=>isAnswerCorrect(s,target));}
function recognizeAnswer(lang){return new Promise((resolve,reject)=>{if(!SR){reject("no-sr");return;}const r=new SR();answerRec=r;r.lang=lang==="it"?"it-IT":"de-DE";r.continuous=false;r.interimResults=true;r.maxAlternatives=3;try{if("processLocally" in r)r.processLocally=true;}catch(e){}let finalTx="",alts=[];
  r.onresult=e=>{let interim="";for(let i=e.resultIndex;i<e.results.length;i++){const res=e.results[i];if(res.isFinal){finalTx=res[0].transcript;for(let k=0;k<res.length;k++)alts.push(res[k].transcript);}else interim+=res[0].transcript;}if(interim){const ib=document.getElementById("interim");if(ib)ib.textContent="“"+interim+"”";}};
  r.onerror=e=>{answerRec=null;reject(e.error||"err");};r.onend=()=>{answerRec=null;resolve({text:finalTx,alts});};
  try{r.start();}catch(e){answerRec=null;reject("start");}});}
function startAnswerCapture(){const c=currentCard();if(!c)return;const target=session.queue[0].front==="it"?"de":"it";answerState="listening";saidText="";renderAssess();
  recognizeAnswer(target).then(res=>{const said=(res.text||"").trim();gradedOk=gradeAnswer(said,res.alts,c[target].word);saidText=said;answerState="graded";flipped=true;if(cardEl)cardEl.classList.add("flip");renderAssess();if(settings.autoSpeak)speak(sideText(c,target),target);})
  .catch(err=>{answerState="prompt";if(err==="not-allowed"||err==="service-not-allowed")alert("Microphone permission is needed for spoken answers.");renderAssess();});}
function stopAnswerCapture(){if(answerRec){try{answerRec.stop();}catch(e){}}}
function renderSpeakControls(a){const c=currentCard();if(!c)return;const target=session.queue[0].front==="it"?"de":"it";
  if(answerState==="prompt"){
    a.appendChild(el("div",{class:"assess"},[el("button",{class:"btn know",style:{gridColumn:"1/-1"},onclick:startAnswerCapture,html:"🎤 Speak the answer ("+(target==="it"?"Italian":"German")+")"})]));
    a.appendChild(el("button",{class:"ghost",style:{width:"100%"},onclick:()=>{answerState="reveal";if(!flipped)doFlip();else renderAssess();}},["Reveal answer instead"]));
  }else if(answerState==="listening"){
    a.appendChild(el("div",{class:"assess"},[el("button",{class:"btn",style:{gridColumn:"1/-1"},onclick:stopAnswerCapture,html:'<span class="spin">◎</span>&nbsp; Listening… tap to stop'})]));
    a.appendChild(el("div",{class:"hint",id:"interim"},["Say the word aloud."]));
  }else if(answerState==="graded"){
    a.appendChild(el("div",{class:"result"},[
      el("div",{class:"rlabel",style:{color:gradedOk?"#BBD69A":"#EAC98A"}},[gradedOk?"✓ Correct":"✗ Not quite"]),
      el("div",{class:"rrow"},["You said: ",el("b",{},[saidText||"—"])]),
      el("div",{class:"rrow"},["Answer: ",el("b",{},[c[target].word])])
    ]));
    if(gradedOk)a.appendChild(el("div",{class:"assess"},[el("button",{class:"btn wide",onclick:()=>{const ok=gradedOk;answerState="prompt";assess(ok);},html:"Next →"})]));
    else a.appendChild(el("div",{class:"assess"},[
      el("button",{class:"btn",onclick:()=>{answerState="prompt";assess(false);},html:"Next →"}),
      el("button",{class:"btn know",onclick:()=>{answerState="prompt";assess(true);},html:"I was right"})
    ]));
  }
}

function doFlip(){flipped=!flipped;if(cardEl)cardEl.classList.toggle("flip",flipped);renderAssess();if(settings.autoSpeak)speakVisible();}
function assess(known){
  const head=session.queue[0];if(!head)return;const c=deck.find(x=>x.id===head.id);if(!c)return;
  const wasLearned=c.streak>=settings.learnY;c.seen++;
  if(known){c.correct++;c.streak++;if(c.streak>=settings.learnY){if(!wasLearned)session.learnedThis++;c.learnedAt=now();}}
  else{c.streak=0;c.learnedAt=null;}
  scheduleSave();
  session.queue=known?session.queue.slice(1):[...session.queue.slice(1),{...head,front:pickFront()}];
  flipped=false;if(session.queue.length===0)session.active=false;renderSession();
}

const app=document.getElementById("app"), tabsEl=document.getElementById("tabs");
function render(){

  app.appendChild(el("div",{class:"head"},[
    el("div",{class:"brand"},[el("span",{class:"logo",html:'lessico<span class="dot">.</span>'}),el("span",{class:"tagline"},["IT · DE"])]),
    el("div",{class:"counts"},[el("div",{html:"<b>"+(st.learning||0)+"</b> learning"}),el("div",{},[(st.learned||0)+" learned"+(st.mastered?" · "+st.mastered+" mastered":"")])])
  ]));

function renderTabs(){tabsEl.innerHTML="";

  tabsEl.appendChild(t("session","Session",I.cards));tabsEl.appendChild(t("words","Words",I.list));tabsEl.appendChild(t("settings","Settings",I.gear));}
function setView(id){if(view==="session"&&id!=="session"){stopListening();handsFree=false;}view=id;if(id==="session"&&!session)startSession();if(id==="words"){searchText="";page=0;}render();}

function chip(label,active,on,cls){return el("button",{class:"chip"+(active?" on":"")+(cls?" "+cls:""),onclick:on},[label]);}

function renderSessionView(){
  app.appendChild(el("div",{class:"ctrlrow"},[
    el("span",{class:"rowlabel"},["Audio"]),
    chip("🔊 Auto-speak",settings.autoSpeak,()=>{settings.autoSpeak=!settings.autoSpeak;saveSettings();render();if(settings.autoSpeak)speakVisible();}),
    chip("Sentence",settings.readSentence,()=>{settings.readSentence=!settings.readSentence;saveSettings();render();}),
    (SR&&settings.answerMode!=="speak")?chip(handsFree?"🎤 Listening":"🎤 Hands-free",handsFree,()=>{handsFree=!handsFree;handsFree?startListening():stopListening();render();},"mic"):null
  ]));

  }

}
function renderSession(){
  const area=document.getElementById("sessionArea");if(!area)return;area.innerHTML="";

    const anyEligible=deck.filter(c=>matchesFilter(c)&&isEligible(c)).length;
    if(session&&session.total>0){
      area.appendChild(el("div",{class:"state"},[
        el("p",{class:"big"},["Session complete"]),
        el("p",{},["You worked through "+session.total+" word"+(session.total>1?"s":"")+(session.learnedThis?" and learned "+session.learnedThis+" of them":"")+"."]),
        el("button",{class:"btn wide",style:{maxWidth:"260px",margin:"0 auto"},onclick:()=>{startSession();renderSession();}},["New session"])
      ]));
    }else{
      area.appendChild(el("div",{class:"state"},[
        el("p",{class:"big"},[anyEligible?"Ready when you are":"All caught up"]),
        el("p",{},[anyEligible?"Start a session to drill up to "+settings.sessionSize+" words from your current filter.":"Nothing is due to learn under this filter. Adjust the filters in Settings, or add words."]),
        anyEligible?el("button",{class:"btn wide",style:{maxWidth:"260px",margin:"0 auto"},onclick:()=>{startSession();renderSession();}},["Start session"]):null
      ]));
    }
    return;
  }
  answerState="prompt";saidText="";gradedOk=null;
  const c=currentCard(), done=session.total-session.queue.length;
  area.appendChild(el("div",{class:"sessmeta"},[el("span",{},[session.queue.length+" left"]),el("span",{},[session.learnedThis+" learned"])]));
  area.appendChild(el("div",{class:"progress"},[el("i",{style:{width:(session.total?Math.round(done/session.total*100):0)+"%"}})]));

  scene.appendChild(cardEl);area.appendChild(scene);
  area.appendChild(el("div",{id:"assess"}));renderAssess();
  if(settings.autoSpeak)speakVisible();
}
function face(lang,c,back){
  const s=c[lang],status=cardStatus(c);

    el("div",{class:"spine",style:{background:lang==="it"?"#7A9A57":"#CB9235"}}),
    el("div",{class:"facetop"},[el("button",{class:"iconbtn",title:"Speak",html:I.speaker,onclick:e=>{e.stopPropagation();speak(sideText(c,lang),lang);}})]),
    el("div",{class:"body"},[el("h2",{class:"word"},[s.word]),s.sentence?el("p",{class:"sentence"},[s.sentence]):null]),
    el("div",{class:"foot"},[
      el("span",{class:"dots"},Array.from({length:settings.learnY},(_,i)=>el("span",{class:i<c.streak?"f":""}))),

}
function renderAssess(){
  const a=document.getElementById("assess");if(!a)return;a.innerHTML="";

  else a.appendChild(el("div",{class:"assess"},[
    el("button",{class:"btn miss",onclick:()=>assess(false),html:I.x+" Missed <span class='kbd'>1</span>"}),
    el("button",{class:"btn know",onclick:()=>assess(true),html:I.check+" Knew it <span class='kbd'>2</span>"})

function renderWordsView(){
  const search=el("input",{class:"inp search",placeholder:"Search words…",value:searchText});

  app.appendChild(el("div",{id:"listWrap"}));renderList();

let addOpen=false;

  const w=document.getElementById("addWrap");if(!w)return;w.innerHTML="";
  w.appendChild(el("button",{class:"ghost",style:{marginBottom:"10px"},onclick:()=>{addOpen=!addOpen;renderAddForm();}},[addOpen?"Close":"+ Add a word"]));
  if(!addOpen)return;
  const g={};const mk=(k,label,ph)=>{const i=el("input",{class:"inp",placeholder:ph||""});g[k]=i;return el("div",{class:"field"},[el("label",{},[label]),i]);};

      saveDeckNow();addOpen=false;render();

function renderList(){
  const w=document.getElementById("listWrap");if(!w)return;w.innerHTML="";
  const q=searchText.trim().toLowerCase();
  const all=q?deck.filter(c=>c.it.word.toLowerCase().includes(q)||c.de.word.toLowerCase().includes(q)):deck;

function renderSettingsView(){
  const seg=(opts,val,on)=>{const s=el("div",{class:"seg"});opts.forEach(o=>s.appendChild(el("button",{class:val===o[0]?"on":"",onclick:()=>on(o[0])},[o[1]])));return s;};

  app.appendChild(el("div",{class:"sec first"},["Study"]));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Direction (front side)"]),seg([["mixed","Mixed"],["it","IT → DE"],["de","DE → IT"]],settings.direction,v=>{settings.direction=v;saveSettings();})]));
  app.appendChild(el("div",{class:"field"},[el("label",{},["Answer mode"]),seg([["self","Self-assess"],["speak","Speak answer"]],settings.answerMode,v=>{settings.answerMode=v;saveSettings();}),el("span",{class:"sub"},[SR?"“Speak answer”: say the translation aloud and it grades you (needs https + microphone).":"“Speak answer” needs a browser with speech recognition, such as Chrome."])]));

  app.appendChild(el("div",{class:"field"},[el("label",{},["Topic filter"]),seg([["all","All"],...topics.map(t=>[t,t])],settings.topic,v=>{settings.topic=v;saveSettings();render();})]));

  app.appendChild(el("div",{class:"field"},[el("label",{},["Correct in a row to mark learned"]),el("div",{class:"numrow"},[num(settings.learnY,1,n=>{settings.learnY=n;saveSettings();})]),el("span",{class:"sub"},["Learned words leave sessions to make room for new ones."])]));

  app.appendChild(el("div",{class:"field"},[el("label",{},["Retire after N total correct (0 = off)"]),el("div",{class:"numrow"},[num(settings.retireN,0,n=>{settings.retireN=n;saveSettings();})]),el("span",{class:"sub"},["Hard mastery cap: once right this many times ever, a word never returns — even with refresh on."])]));

  app.appendChild(el("div",{class:"sec"},["Audio defaults"]));
  app.appendChild(el("div",{class:"ctrlrow"},[
    chip("Auto-speak",settings.autoSpeak,()=>{settings.autoSpeak=!settings.autoSpeak;saveSettings();render();}),

function exportDeck(){const blob=new Blob([JSON.stringify(deck,null,2)],{type:"application/json"});const a=el("a",{href:URL.createObjectURL(blob),download:"lessico-deck.json"});document.body.appendChild(a);a.click();a.remove();}
function importDeck(){const inp=el("input",{type:"file",accept:"application/json,.json"});inp.addEventListener("change",()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(Array.isArray(d)){deck=d.map(normalizeCard);saveDeckNow();session=null;render();}else alert("Not a valid deck file.");}catch(e){alert("That file could not be read.");}};r.readAsText(f);});inp.click();}
function mergeDictionary(){const have=new Set(deck.map(c=>(c.it.word+"||"+c.de.word).toLowerCase()));let added=0;seedList().forEach(s=>{const k=(s.it.word+"||"+s.de.word).toLowerCase();if(!have.has(k)){deck.push(s);have.add(k);added++;}});saveDeckNow();render();alert(added?("Added "+added+" new word"+(added>1?"s":"")+" from the dictionary."):"No new words to add — you already have them all.");}
function resetProgress(){if(confirm("Reset all scores and learned status to zero? Your words stay; only progress is cleared.")){deck=deck.map(c=>({...c,streak:0,correct:0,seen:0,learnedAt:null}));saveDeckNow();session=null;render();}}
function resetDeck(){if(confirm("Replace your whole deck with the original dictionary (words.js)? Added cards and all progress will be lost.")){deck=seedList();saveDeckNow();session=null;render();}}

window.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT"||e.target.tagName==="TEXTAREA")return;
  if(view!=="session"||!currentCard())return;
  if(e.code==="Space"||e.code==="Enter"){e.preventDefault();doFlip();}
  else if(flipped&&(e.key==="1"||e.key.toLowerCase()==="j"))assess(false);
  else if(flipped&&(e.key==="2"||e.key.toLowerCase()==="k"))assess(true);
});
window.addEventListener("pagehide",saveDeckNow);
document.addEventListener("visibilitychange",()=>{if(document.hidden)saveDeckNow();});

function iconURL(size){const cv=document.createElement("canvas");cv.width=cv.height=size;const x=cv.getContext("2d");const r=size*.22;x.fillStyle="#1E2D2F";x.beginPath();x.moveTo(r,0);x.arcTo(size,0,size,size,r);x.arcTo(size,size,0,size,r);x.arcTo(0,size,0,0,r);x.arcTo(0,0,size,0,r);x.closePath();x.fill();x.fillStyle="#F6F1E6";x.font="600 "+(size*.62)+"px Georgia,serif";x.textAlign="center";x.textBaseline="middle";x.fillText("l",size*.42,size*.52);x.fillStyle="#7A9A57";x.beginPath();x.arc(size*.62,size*.72,size*.07,0,7);x.fill();return cv.toDataURL("image/png");}

if("serviceWorker" in navigator&&location.protocol.startsWith("http"))navigator.serviceWorker.register("sw.js").catch(()=>{});

installManifest();loadSettings();loadDeck();startSession();render();
